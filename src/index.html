<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Taller Desarrollo Mobile</title>
    <script
      type="module"
      src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"
    ></script>
    <script
      nomodule
      src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.js"
    ></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
  </head>
  <body>
    <ion-app>
      <ion-router id="ruteo">
        <ion-route url="/login" component="page-login"></ion-route>
        <ion-route url="/registro" component="page-registro"></ion-route>
        <ion-route url="/peliculas" component="page-peliculas"></ion-route>
        <ion-route url="/mapa" component="page-mapa"></ion-route>
      </ion-router>
      <ion-router-outlet></ion-router-outlet>

      <ion-menu content-id="main-content" id="menu">
        <ion-header>
          <ion-toolbar>
            <ion-buttons slot="start">
              <ion-menu-button></ion-menu-button>
            </ion-buttons>
            <ion-title>Menú</ion-title>
          </ion-toolbar>
        </ion-header>
        <ion-content class="ion-padding">
          <ion-list>
            <ion-item id="menu-login" href="/login">
              <ion-icon name="log-in-outline" slot="end"></ion-icon>
              <ion-label>Login</ion-label>
            </ion-item>
            <ion-item id="menu-registro" href="/registro">
              <ion-icon name="person-add-outline" slot="end"></ion-icon>
              <ion-label>Registro</ion-label>
            </ion-item>
            <ion-item id="menu-peliculas" href="/peliculas">
              <ion-icon name="film-outline" slot="end"></ion-icon>
              <ion-label>Peliculas</ion-label>
            </ion-item>
            <ion-item id="menu-mapa" href="/mapa">
              <ion-icon name="map-outline" slot="end"></ion-icon>
              <ion-label>Mapa</ion-label>
            </ion-item>
            <ion-item id="menu-logout">
              <ion-icon name="log-out-outline" slot="end"></ion-icon>
              <ion-label>Cerrar sesión</ion-label>
            </ion-item>
          </ion-list>
        </ion-content>
      </ion-menu>

      <div class="ion-page" id="main-content"></div>

      <ion-page class="ion-page" id="page-login" style="display: none">
        <ion-header>
          <ion-toolbar>
            <ion-buttons slot="start">
              <ion-menu-button></ion-menu-button>
            </ion-buttons>
            <ion-title>Login</ion-title>
          </ion-toolbar>
        </ion-header>
        <ion-content class="ion-padding">
          <ion-list>
            <ion-item>
              <ion-label position="stacked">Usuario</ion-label>
              <ion-input id="log-usuario" type="text" placeholder="Ingrese su usuario"></ion-input>
            </ion-item>
            <ion-item>
              <ion-label position="stacked">Contraseña</ion-label>
              <ion-input id="log-password" type="password" placeholder="Ingrese su contraseña"></ion-input>
            </ion-item>
          </ion-list>
          <ion-text id="log-error" color="danger" style="display: none;">
            <p id="log-error-msg" class="ion-padding-horizontal"></p>
          </ion-text>
          <div class="ion-padding">
            <ion-button id="btn-login" expand="block">Ingresar</ion-button>
          </div>
        </ion-content>
      </ion-page>

      <ion-page class="ion-page" id="page-registro" style="display: none">
        <ion-header>
          <ion-toolbar>
            <ion-buttons slot="start">
              <ion-menu-button></ion-menu-button>
            </ion-buttons>
            <ion-title>Registro</ion-title>
          </ion-toolbar>
        </ion-header>
        <ion-content class="ion-padding">
          <ion-list>
            <ion-item>
              <ion-label position="stacked">Usuario</ion-label>
              <ion-input id="reg-usuario" type="text" placeholder="Ingrese su usuario"></ion-input>
            </ion-item>
            <ion-item>
              <ion-label position="stacked">Contraseña</ion-label>
              <ion-input id="reg-password" type="password" placeholder="Ingrese su contraseña"></ion-input>
            </ion-item>
            <ion-item>
              <ion-label>País</ion-label>
              <ion-select id="reg-pais" placeholder="Seleccionar país"></ion-select>
            </ion-item>
          </ion-list>
          <ion-text id="reg-error" color="danger" style="display: none;">
            <p id="reg-error-msg" class="ion-padding-horizontal"></p>
          </ion-text>
          <div class="ion-padding">
            <ion-button id="btn-registrar" expand="block">Registrarse</ion-button>
          </div>
        </ion-content>
      </ion-page>

      <ion-page class="ion-page" id="page-peliculas" style="display: none">
        <ion-header>
          <ion-toolbar>
            <ion-buttons slot="start">
              <ion-menu-button></ion-menu-button>
            </ion-buttons>
            <ion-title>Películas</ion-title>
            <ion-buttons slot="end">
              <ion-button id="btn-mostrar-form-pelicula">
                <ion-icon name="add-outline" slot="icon-only"></ion-icon>
              </ion-button>
            </ion-buttons>
          </ion-toolbar>
        </ion-header>
        <ion-content class="ion-padding">

          <div id="form-pelicula" style="display: none;">
            <ion-list>
              <ion-item>
                <ion-label>Categoría</ion-label>
                <ion-select id="pel-categoria" placeholder="Seleccionar categoría"></ion-select>
              </ion-item>
              <ion-item>
                <ion-label position="stacked">Nombre</ion-label>
                <ion-input id="pel-nombre" type="text" placeholder="Nombre de la película"></ion-input>
              </ion-item>
              <ion-item>
                <ion-label position="stacked">Fecha de visualización</ion-label>
                <ion-input id="pel-fecha" type="date"></ion-input>
              </ion-item>
              <ion-item>
                <ion-label position="stacked">Comentario</ion-label>
                <ion-textarea id="pel-comentario" placeholder="Tu opinión sobre la película" rows="3"></ion-textarea>
              </ion-item>
            </ion-list>
            <ion-text id="pel-error" color="danger" style="display: none;">
              <p id="pel-error-msg" class="ion-padding-horizontal"></p>
            </ion-text>
            <div class="ion-padding">
              <ion-button id="btn-agregar-pelicula" expand="block">Agregar</ion-button>
              <ion-button id="btn-cancelar-pelicula" expand="block" fill="outline" color="medium">Cancelar</ion-button>
            </div>
          </div>

          <ion-segment id="filtro-peliculas" value="todas">
            <ion-segment-button value="todas">
              <ion-label>Todas</ion-label>
            </ion-segment-button>
            <ion-segment-button value="semana">
              <ion-label>Última semana</ion-label>
            </ion-segment-button>
            <ion-segment-button value="mes">
              <ion-label>Último mes</ion-label>
            </ion-segment-button>
          </ion-segment>

          <ion-list id="lista-peliculas"></ion-list>

        </ion-content>
      </ion-page>

      <ion-page class="ion-page" id="page-mapa" style="display: none">
        <ion-header>
          <ion-toolbar>
            <ion-buttons slot="start">
              <ion-menu-button></ion-menu-button>
            </ion-buttons>
            <ion-title>Mapa</ion-title>
          </ion-toolbar>
        </ion-header>
        <ion-content>
          <div id="mapa" style="width: 100%; height: 400px"></div>
        </ion-content>
      </ion-page>
    </ion-app>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="js/entities/usuario.js"></script>
    <script src="js/entities/pelicula.js"></script>
    <script src="js/entities/categoria.js"></script>
    <script src="js/entities/usuarioPorPais.js"></script>
    <script src="js/entities/app.js"></script>
    <script src="js/utils/fetchData.js"></script>
    <script src="js/utils/navigate.js"></script>
    <script src="js/index.js"></script>
    <script src="js/pages/login.js"></script>
    <script src="js/pages/registro.js"></script>
    <script src="js/pages/peliculas.js"></script>
    <script src="js/utils/events.js"></script>
  </body>
</html>
